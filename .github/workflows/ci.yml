name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-test:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run build
      - name: Run unit tests (nacos-common)
        working-directory: packages/nacos-common
        run: npx midway-bin test --ts -- --file test/grpc/payload_codec.test.ts --timeout 30000
      - name: Run unit tests (nacos-config)
        working-directory: packages/nacos-config
        run: npx midway-bin test --ts -- --file test/utils.test.ts --timeout 30000
      - name: Run unit tests (nacos-naming)
        working-directory: packages/nacos-naming
        run: npx midway-bin test --ts -- --file test/naming/instance.test.ts --file test/naming/service_info.test.ts --file test/util/index.test.ts --timeout 30000

  integration-grpc:
    name: Integration Tests (gRPC + Nacos 3.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Nacos 3.x
        run: |
          docker run -d --name nacos3 \
            -e MODE=standalone \
            -e NACOS_AUTH_ENABLE=true \
            -e NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789 \
            -e NACOS_AUTH_IDENTITY_KEY=serverIdentity \
            -e NACOS_AUTH_IDENTITY_VALUE=security \
            -p 8080:8080 \
            -p 8848:8848 \
            -p 9848:9848 \
            nacos/nacos-server:v3.2.0
      - name: Wait for Nacos 3.x to be ready
        run: |
          echo "Waiting for Nacos 3.x HTTP + gRPC..."
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8848/nacos/ > /dev/null 2>&1; then
              echo "Nacos 3.x HTTP ready (attempt $i)"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 3
          done
          echo "Initializing admin user..."
          sleep 5
          curl -sf -X POST 'http://127.0.0.1:8080/v3/auth/user/admin' -d 'password=nacos' || true
          echo "Verifying login..."
          curl -sf -X POST 'http://127.0.0.1:8848/nacos/v1/auth/login' -d 'username=nacos&password=nacos' || true
          echo "Waiting for gRPC port..."
          sleep 10
          echo "Proceeding with tests"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run build
      - name: Naming gRPC tests
        working-directory: packages/nacos-naming
        run: npx midway-bin test --ts -- --file test/naming/grpc_proxy.test.ts --timeout 60000
      - name: Config gRPC tests
        working-directory: packages/nacos-config
        run: npx midway-bin test --ts -- --file test/grpc_config_proxy.test.ts --timeout 60000
      - name: Show Nacos logs on failure
        if: failure()
        run: docker logs nacos3 --tail 100

  integration-http:
    name: Integration Tests (HTTP + Nacos 2.x)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Nacos 2.x
        run: |
          docker run -d --name nacos2 \
            -e MODE=standalone \
            -e NACOS_AUTH_ENABLE=false \
            -p 8848:8848 \
            -p 9848:9848 \
            nacos/nacos-server:v2.5.2
      - name: Wait for Nacos 2.x to be ready
        run: |
          echo "Waiting for Nacos 2.x..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8848/nacos/v1/ns/operator/metrics > /dev/null 2>&1; then
              echo "Nacos 2.x is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 3
          done
          sleep 5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run build
      - name: Naming HTTP tests
        working-directory: packages/nacos-naming
        run: npx midway-bin test --ts -- --file test/naming/proxy.test.ts --file test/naming/push_receiver.test.ts --timeout 60000
      - name: Show Nacos logs on failure
        if: failure()
        run: docker logs nacos2 --tail 100
